name: Deploy Query Analytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Create release archive
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/query-analytics-release.tar.gz"
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.env \
            --exclude=config/sources.local.json \
            -czf "$ARCHIVE_PATH" .

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp "$RUNNER_TEMP/query-analytics-release.tar.gz" "$VPS_USER@$VPS_HOST:/tmp/query-analytics-release.tar.gz"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SERVICE_NAME: ${{ secrets.VPS_SERVICE_NAME }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "APP_DIR='${VPS_APP_DIR:-/opt/query-analytics}' SERVICE_NAME='${VPS_SERVICE_NAME:-query-analytics.service}' RELEASE_ARCHIVE='/tmp/query-analytics-release.tar.gz' bash -s" < deploy/remote-deploy.sh
